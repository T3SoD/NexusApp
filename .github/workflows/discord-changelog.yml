name: Discord changelog notify

# Posts the latest changelog entry to a Discord channel when a GitHub release
# is PUBLISHED (i.e. when the release pipeline finishes and the downloads are
# live). Fires exactly once per release, so the announcement always matches an
# actual, downloadable release — and pushing a version bump to main no longer
# posts on its own.

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (at the released tag)
        uses: actions/checkout@v5

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CURRENT_FILE: Nexus_v4/Views/AboutDialog.xaml.cs
          # Empty -> the script posts the current top changelog entry. No
          # previous-commit comparison is needed: a release event is itself the
          # signal that this is a new version, so it can't double-post.
          PREVIOUS_FILE: ""
        run: python3 .github/scripts/notify_discord.py
