name: Discord changelog notify (manual)

# MANUAL re-post button. Automatic posting on release is handled by the
# notify-discord job in release.yml (which runs in the same workflow run as the
# release, so it isn't blocked by GitHub's GITHUB_TOKEN no-trigger rule).
#
# Use this to post the current top changelog entry on demand — e.g. to catch up
# a release whose notification was missed. Run it from the Actions tab.

on:
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CURRENT_FILE: NexusApp/Views/AboutDialog.xaml.cs
          PREVIOUS_FILE: ""   # empty -> post the current top changelog entry
        run: python3 .github/scripts/notify_discord.py
