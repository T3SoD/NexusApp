name: Build check

# Verifies the app compiles cleanly on a stock Windows runner for every
# push / PR to main. Does not produce or publish anything.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore NexusApp/NexusApp.csproj

      - name: Build (Release)
        run: dotnet build NexusApp/NexusApp.csproj -c Release --no-restore
