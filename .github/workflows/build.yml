name: Build check

# Verifies the app compiles cleanly and the unit test suite passes on a stock
# Windows runner for every push / PR to main. Does not produce or publish
# anything.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '8.0.x'

      # Restoring the test project also restores the app project it references.
      - name: Restore
        run: dotnet restore NexusApp.Tests/NexusApp.Tests.csproj

      - name: Build (Release)
        run: dotnet build NexusApp/NexusApp.csproj -c Release --no-restore

      - name: Test (Release)
        run: dotnet test NexusApp.Tests/NexusApp.Tests.csproj -c Release --no-restore
